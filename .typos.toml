[default.extend-words]
# Apple iTerm2 plist key name (cannot be changed)
Interpeter = "Interpeter"
# tre-command is the actual crate name on crates.io
tre = "tre"
# AMBER topology/parameter file format (.parm7)
parm = "parm"
# antechamber output format flag (-fo mol2)
fo = "fo"
# vector direction abbreviation (e.g. vec_ba = vector from b to a)
ba = "ba"
